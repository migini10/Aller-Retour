name: aller_retour_mobile
description: Application Mobile SaaS de Transport Inter-Urbain (Voyageurs, Chauffeurs & Terminaux POS Android)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.6.0
  provider: ^6.1.2
  sqflite: ^2.3.2
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  intl: ^0.19.0
  geolocator: ^14.0.2
  image_picker: ^1.1.2

  path: any
  flutter_dotenv: ^6.0.1
  local_auth: ^3.0.1
  google_fonts: ^8.1.0
  google_maps_flutter: ^2.17.1
  flutter_polyline_points: ^3.1.0
  http_parser: ^4.1.2
  flutter_secure_storage: ^10.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/destinations/
    - assets/images/vehicle_photo_guide_allogoo.png
