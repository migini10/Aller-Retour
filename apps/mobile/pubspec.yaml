name: aller_retour_mobile
description: Application Mobile SaaS de Transport Inter-Urbain (Voyageurs, Chauffeurs & Terminaux POS Android)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.2
  sqflite: ^2.3.2
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6
  intl: ^0.19.0
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/peugeot_406_hero.png
